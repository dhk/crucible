concepts_added:
  - id: FPS-025
    name: governance-capture
    description: "The failure mode in which multi-stakeholder governance bodies are dominated by the well-resourced actors they are meant to check, achieved through funding of full-time participants, agenda-setting, and procedural influence rather than formal veto."
  - id: FPS-026
    name: compliance-sovereignty-conflict
    description: "The structural tension between regulatory compliance obligations (GDPR, HIPAA, SOC2) and user sovereignty as defined in this proposal; in regulated industries, binding law requires organizations to restrict exactly the freedoms the layered sovereignty priority rule protects."
  - id: FPS-027
    name: unfunded-obligation
    description: "The failure mode in which positive architectural obligations (documentation, stable interfaces, test infrastructure) imposed on builders without a corresponding funding model select for well-resourced actors and disadvantage under-resourced projects, potentially concentrating the power the framework was designed to check."

