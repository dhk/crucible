concepts_added:
  - id: FPS-041
    name: disclosure-theater
    description: The failure mode where legible-defaults and disclosure-requirement criteria produce technically compliant notifications that users cannot meaningfully process at interaction volume — disclosures are present and understandable in principle, but habituated dismissal renders them practically invisible; the formal/practical gap applied to disclosure itself.
  - id: FPS-042
    name: cooperative-capture
    description: The failure mode where user-cooperative governance is captured by the active minority of participants who have systematically different interests from the passive majority; structurally distinct from resource-based capture (FPS-025) — the capture mechanism is participation-attrition rather than funding-dominance, but the governance-misrepresentation outcome is analogous.

