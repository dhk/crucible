concepts_added:
  - id: FPS-021
    name: layered-sovereignty
    description: >
      A governance model that resolves multi-party sovereignty by assigning
      domain-specific rights to end users, administrators, and organizations,
      with a priority rule that no layer may eliminate a lower layer's rights
      within that lower layer's domain. Sovereignty is domain-specific,
      not strictly hierarchical.
  - id: FPS-022
    name: freedom-activation-energy
    description: >
      The threshold of skill, effort, tooling, and knowledge required before
      a formally-permitted freedom becomes practically exercisable. Reducing
      activation energy is a positive design obligation for freedom-preserving
      systems; high activation energy is the mechanism through which formal
      freedom fails to produce practical freedom.
  - id: FPS-023
    name: positive-architectural-obligation
    description: >
      The obligation on system builders to actively enable the exercise of
      freedoms through architecture — progressive disclosure, sufficient
      documentation, stable interfaces, test infrastructure — beyond merely
      refraining from restricting them. An intentional extension beyond the
      GNU definition's negative-liberty register.
  - id: FPS-024
    name: AI-inspectability
    description: >
      The specific conditions under which AI-powered systems satisfy
      inspectability-by-default: (1) auditable training lineage, (2) traceable
      inference paths, (3) testable decision boundaries, (4) surfaced
      uncertainty. Distinguishes from post-hoc saliency explanations which
      satisfy the appearance but not the substance of inspectability.

