walls_identified:
  - id: economic-sustainability
    description: >
      Freedom vs. economic sustainability remains genuinely unresolved.
      No existing governance model (public subsidy, commons, dual-licensing)
      has proven reliably sustainable at scale without freedom compromise.
      The steelman pass documents this as an open structural challenge
      rather than providing a provisional position.

stance:
  supports:
    - FPS-004 as operative standard (not merely necessary condition)
    - layered-sovereignty over monolithic user framing
    - positive-architectural-obligation as first-class requirement
    - AI-inspectability criteria (auditability + testability + interruptibility)
  challenges:
    - pure GNU negative-liberty framing (extended to positive obligations)
    - treating "who is the user" as unanswerable
  neutral:
    - composability-paradox (preserved as speculative)
    - economic sustainability tension (remains open)

rationale:
  - The formal/practical freedom distinction is the central mechanism through
    which freedom-reducing systems evade critique; elevating it to a framework
    gives it structural force across all principles.
  - Layered sovereignty resolves the multi-party question without privileging
    organizational control over end-user rights.
  - Positive architectural obligations extend the proposal beyond permission
    to enablement; this is a defensible and necessary extension given the
    capability framing adopted.
  - AI-inspectability criteria address the most contemporarily relevant gap;
    the auditability/testability/interruptibility standard is achievable where
    full mechanistic transparency is not.

