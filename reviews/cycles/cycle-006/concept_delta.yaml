concepts_added:
  - id: FPS-033
    name: meta-governance-gap
    description: The failure mode in which a governance or oversight mechanism is itself ungoverned and unfunded — specifically, the periodic freedom assessment mechanism proposed here lacks its own governance charter, funding model, and enforcement authority, making it subject to the same freedom-decay it is designed to detect; the unfunded-obligation anti-pattern applied recursively.
  - id: FPS-034
    name: circular-operationalization
    description: The failure mode in which an empirical test for a concept requires conditions that are the outcome the proposal is designed to produce, making the test inert in the current state where it would be most needed; specifically, the structural coercion distinguishing test for voluntary delegation requires zero-exit-cost conditions that do not currently exist, making the test non-diagnostic in status-quo markets.

concepts_modified:
  - id: FPS-030
    change: Distinguishing test for structural coercion flagged as circular operationalization — the test requires counterfactual conditions that are the proposal's design goal; framing is analytically coherent but provides no present-tense diagnostic tool.
  - id: FPS-032
    change: Non-weaponization obligation flagged as misclassified in the hard tier — intent-determination defeats enforceability; hard-obligation framing produces fork-suppression instrument; reclassification to soft norm needed.
  - id: FPS-031
    change: Reversibility criterion 3 flagged as internally contradicting security-by-design practices — intentionally irreversible security defaults conflict with the no-irreversible-defaults requirement; scoping exception needed.
  - id: FPS-028
    change: Periodic assessment mechanism flagged as itself ungoverned and unfunded — subject to the freedom-decay it was designed to detect; assessment governance clause vacuous under conditions of community stress.
  - id: FPS-019
    change: Tiered modifiability criterion flagged as self-assignment problem — tiers claimed by builders with no external verification; self-attestation-dependent despite being introduced to improve on AI-inspectability self-attestation failure.

