rationale:
  - The periodic assessment mechanism reproduces the unfunded-obligation failure mode at the meta-level — the mechanism is ungoverned and unfunded, guaranteeing either non-occurrence or compliance theater
  - The structural coercion framing for voluntary delegation is analytically sound but operationally circular — the distinguishing test cannot fire in the conditions where it is most needed
  - Non-weaponization belongs in the soft-norm tier; its placement in the hard-obligation tier creates a fork-suppression instrument controlled by whoever adjudicates intent
  - Reversibility criterion 3 reproduces the freedom/security contradiction inside the Reversibility sub-principle without resolution
  - Tiered modifiability is self-assigned, making it as self-attestation-dependent as the criteria it replaced

