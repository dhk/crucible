stance:
  supports:
    - exit-option framing as complement to capability framing (sidesteps individual-capacity problem)
    - legible-defaults as partial resolution to reversibility/security contradiction
    - regulatory alignment as low-marginal-cost bootstrap for assessment governance
    - composable sovereignty as architectural operationalization of graduated delegation
  challenges:
    - user-cooperative governance is underdeveloped — cooperative governance at platform scale has
      its own well-documented failure modes (free-rider, low participation, founder capture)
      that this pass does not address; steelman should stress-test
    - exit-ecosystem viability condition is underspecified — "meaningful fraction of current users"
      is a relative standard that could be set arbitrarily high or low
  neutral:
    - freedom-budget concept is speculative and needs a concrete measurement protocol
      before it can be promoted from emergent status

rationale:
  - Strawman role is generative, not evaluative. New concepts are added at emergent status;
    promotion decisions belong to the steelman pass.
  - Exit-option and active-governance framings are structurally distinct from the five existing
    framings — they imply different success criteria and different design targets, not just
    different vocabulary for the same commitments.
  - Legible-defaults does not resolve the freedom/security tension; it reframes the criterion
    at a level of specificity that survives the dead end. Whether the weaker criterion is
    sufficient is an open normative question for the steelman pass.

