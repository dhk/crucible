document: docs/active/discuss-the-premise-of-freedom-preservin.md

concepts_added: []

concepts_modified:
  - id: FPS-028
    name: freedom-decay
    change: >
      Promoted from emergent/speculative to active. Added concrete decay indicators
      (documentation staleness, contributor concentration, dependency accumulation,
      network effect growth, codebase comprehension ceiling) with observable metrics
      for each. Added periodic assessment mechanism with inputs, cadence triggers,
      intervention threshold (two of five indicators degraded), and governance
      structure. Infrastructure capture named as primary freedom-decay accelerant.
      Infrastructure dependency footprint identified as assessment input.

  - id: FPS-029
    name: infrastructure-dependency-stack
    change: >
      Promoted from emergent/speculative to active. Removed [speculative] annotation.
      Added concrete design implication: systems must document their infrastructure
      dependency footprint (enumeration of each external dependency with governance
      status — commercially controlled, commons-governed, or self-hostable).
      Preference for commons-governed dependencies elevated from candidate implication
      to requirement. Connected to freedom-decay: infrastructure capture is a primary
      accelerant of freedom-decay; the footprint is both a design artifact and a
      periodic assessment input.

  - id: FPS-030
    name: voluntary-delegation
    change: >
      Promoted from emergent to active. Committed to interpretation 3 (structural
      coercion) as the operative assumption. Acknowledged interpretations 1 and 2 as
      real boundary conditions with an empirical distinguishing test: when exit costs
      approach zero and genuine alternatives exist, do users continue to choose the
      freedom-reducing arrangement? Added concrete design implication: the system's
      obligation is to ensure genuine alternatives exist (ecosystem model), not to
      prevent freedom-reducing choices (prohibition model).

  - id: FPS-031
    name: reversibility
    change: >
      Promoted from emergent/speculative to active. Defined precisely as the
      individual-user temporal mechanism allowing users to undo state changes, exit
      configurations, and restore prior capability without data loss. Distinguished
      from forkability (collective continuity), data portability (transfer mechanism),
      and exit rights (permission mechanism). Integrated as a sub-principle of User
      Sovereignty. Added four testable criteria: state undo, exit without loss, no
      irreversible defaults, degradation transparency. Rationale: irreversibility
      chills user agency through accumulated exit costs, concentrating effective
      authority in system design rather than the user.

  - id: FPS-032
    name: contributor-obligations
    change: >
      Promoted from emergent/speculative to active. Distinguished hard obligations
      (attribution, non-weaponization) from soft norms (upkeep contribution). Hard
      obligations are enforceable through license terms or governance policy; soft
      norms are reinforced through community culture and recognition. Rationale for
      hard/soft distinction: upkeep as a hard obligation produces the
      unfunded-obligation anti-pattern at the individual level; attribution and
      non-weaponization are binary, low-cost to comply with, and their absence
      directly degrades the commons. Integrated into governance model framing.

concepts_removed: []
concepts_resurrected: []

dead_ends_identified:
  - id: modifiability-criterion-frontier-ai
    description: >
      The tiered modifiability criterion (solo/small-team/large-team) still does not
      address frontier AI models, where no team of any size can fork a model without
      access to training infrastructure and data not available under any open license.
      The tiered criterion applies to the system around the model but not the model
      weights as a modifiable artifact.
  - id: security-freedom-evidence-standard-user-gap
    description: >
      The three-condition evidence standard for security-justified restrictions creates
      a security-researcher-level accountability mechanism, not a user-level mechanism.
      The access asymmetry between users and vendors is narrowed but not eliminated.

walls_identified: []

stance:
  supports:
    - FPS-028 (freedom-decay indicators are concrete and assessable)
    - FPS-029 (infrastructure footprint documentation is a tractable design requirement)
    - FPS-030 (structural coercion framing is empirically dominant in network-effects markets)
    - FPS-031 (reversibility is a genuine gap not covered by forkability or portability)
    - FPS-032 (hard/soft distinction avoids unfunded-obligation failure at individual level)
  challenges:
    - FPS-024 (AI-inspectability criteria still dependent on vendor self-attestation; steelman pass did not resolve this)
    - FPS-023 (positive-architectural-obligation still subject to unfunded-obligation failure mode)
  neutral:
    - FPS-025 (governance-capture: acknowledged but not addressed in this pass)
    - FPS-026 (compliance-sovereignty-conflict: acknowledged but not addressed in this pass)

rationale:
  - The five emergent concepts from cycle 004 were all in speculative/unresolved state; the steelman pass committed where evidence supports commitment
  - Structural coercion framing selected for voluntary-delegation because it is the modal case in network-effects markets and produces an actionable design obligation (ensure alternatives exist)
  - Hard/soft distinction for contributor obligations preserves the commons maintenance goal while avoiding the unfunded-obligation failure mode
  - Freedom-decay was prioritized for concrete development because it undermines all five core principles simultaneously if unaddressed
  - Reversibility promoted because it addresses an individual-temporal failure mode not covered by existing collective mechanisms (forkability) or permission mechanisms (exit rights)

