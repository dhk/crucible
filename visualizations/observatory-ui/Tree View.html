<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crucible · Concept Tree</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tree-styles.css" />
<link rel="stylesheet" href="views/evolution.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- data.js: mock data used as fallback when observatory.json is not found -->
<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="views/timeline.jsx"></script>
<script type="text/babel" src="views/branches.jsx"></script>
<script type="text/babel" src="views/agents.jsx"></script>
<script type="text/babel" src="views/islands.jsx"></script>
<script type="text/babel" src="views/evolution.jsx"></script>
<script type="text/babel" src="tree-view.jsx"></script>

<script type="text/babel" data-presets="env,react">
  // Boot — try to load real observatory.json, fall back to data.js mock globals
  async function boot() {
    const root = ReactDOM.createRoot(document.getElementById('root'));
    try {
      const res = await fetch('../observatory.json');
      if (res.ok) {
        const data = await res.json();
        Object.assign(window, {
          DOC:       data.document,
          AGENTS:    Object.fromEntries(data.agents.map(a => [a.id, a])),
          CONCEPTS:  data.concepts,
          EDGES:     data.edges,
          CYCLES:    data.cycles,
          BRANCHES:  data.branches,
          ISLANDS:   data.islands,
          DEAD_ENDS: data.deadEnds,
        });
      }
    } catch (_) {
      // Fall back to data.js mock globals
    }
    root.render(<TreeApp />);
  }
  boot();
</script>
</body>
</html>
